# Curated transaction CHOICES for the mainframe panel — the menu the presenter
# picks from in phases 1 and 4. These are *templates*, not executed transactions:
# selecting one posts a fresh transaction at demo time (MainframeProxyService).
#
# Why this file exists (see CLAUDE.md §10): the demo must open with ZERO
# transactions and $0 balances, while the mainframe panel still shows the choices.
# So the menu lives here, in a shipped resource, instead of as pre-seeded rows in
# the `transaction` table. The Postgres seed (20-seed-curated.sql) therefore seeds
# customers / accounts / products only — no transactions.
#
# Field notes:
#   amount_cents   integer cents (matches the DB's cents-as-integer convention).
#   customer_name  denormalized so the menu renders even when the mainframe-proxy
#   product_name   DB is unreachable (the service uses a lazy connection pool).
#                  product_id / product_name are null for PAYMENT entries.
transactions:
