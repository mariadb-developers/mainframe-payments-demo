schema_version: 13

demo:
  name: mainframe-payments
  description: |
    Mainframe Payments Demo — incremental migration of high-throughput payment workloads
    off a mainframe onto a modern stack: Postgres mainframe-proxy → GG8 write-through →
    MariaDB analytics, with one-way CDC (Debezium + Kafka) feeding GG from the proxy.
  stage: development
  gridgain8_license_file: cluster/gridgain8-license.xml
  log_ready_checks: false
  ownership_tag: mainframe-payments-demo
  output_directory: build/gridgain/output
  runtime_directory: build/gridgain/.runtime
  working_directory: .
  demo_access:
    enabled: true
    max_exposed_nodes: 3

# ──────────────────────────────────────────────────────────────────────
# Infrastructure
# ──────────────────────────────────────────────────────────────────────
infrastructure_accounts:
  gcp-dev:
    disabled: false
    provider: gcp
    # TODO before first deploy: replace with the GCP account / project you own.
    gke_account: david.brown@gridgain.com
    gke_project: david-brown-personal

infrastructure_templates:
  mainframe-payments-gke:
    disabled: false
    platform: gke
    k8s_default_pool_template: default-gke-pool
    k8s_requested_default_nodes: 1
    k8s_min_default_nodes: 1
    k8s_max_default_nodes: 3

infrastructures:
  mainframe-payments-gke:
    disabled: false
    template: mainframe-payments-gke
    account: gcp-dev
    region: us-west1
    zones:
      - a
    zone_spread: SINGLE

node_pool_templates:
  default-gke-pool:
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  gg-cluster-gke-pool:
    # GridGain cluster nodes — sized for the demo's working set + persistence.
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 30GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  db-gke-pool:
    # Shared by Postgres mainframe-proxy and MariaDB analytics — co-locating both
    # databases on the same pool is fine for a 5–10 min demo.
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  cdc-gke-pool:
    # Kafka + Kafka Connect for the CDC pipeline.
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 30GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true

# ──────────────────────────────────────────────────────────────────────
# Cluster (single GG8 cluster — GG9 variant deferred per CLAUDE.md §15)
# ──────────────────────────────────────────────────────────────────────
cluster_templates:
  mainframe-payments-gg8:
    disabled: false
    platform: gke
    nodes: 2
    replicas: 1
    management_port: 8080
    client_port: 10800
    discovery_port: 47500
    multicast:
      group: 228.1.2.4
      port: 47400
      result_wait_time: 2000
      ttl: 5
    metastorage_node_limit: 3
    resources:
      limits:
        cpu: 3000m
        memory: 10Gi
      requests:
        cpu: 2000m
        memory: 8Gi
      data_storage:
        size: 10Gi
    data_models: []
    base_data: []
    telemetry:
      service_port: 3200
      sources:
        - jvm
        - os
    image: gridgain8
    k8s_node_pool_template: gg-cluster-gke-pool
    k8s_storage:
      retain_on_cluster_destroy: false
      disk_type: pd-ssd
      volume_binding_mode: WaitForFirstConsumer
    pvc_retention_policy:
      enabled: false
      when_scaled: Retain
      when_deleted: Retain
    extra_env_vars: []
    extra_volume_mounts: []
    extra_volumes: []
    job_resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    statefulset_policy:
      pod_management_policy: Parallel
      update_strategy_type: RollingUpdate
      update_strategy_partition: 0
      revision_history_limit: 10
      work_dir: /opt/ignite/work
    persistence_enabled: true
    snapshot_profiles: {}
    pod_lifecycle:
      termination_grace_period_seconds: 180
      liveness_probe:
        enabled: false
        path: /
        port: 8080
        initial_delay_seconds: 0
        period_seconds: 10
        timeout_seconds: 1
        success_threshold: 1
        failure_threshold: 3
      readiness_probe:
        enabled: false
        path: /
        port: 8080
        initial_delay_seconds: 0
        period_seconds: 10
        timeout_seconds: 1
        success_threshold: 1
        failure_threshold: 3
      startup_probe:
        enabled: false
        path: /
        port: 8080
        initial_delay_seconds: 0
        period_seconds: 10
        timeout_seconds: 1
        success_threshold: 1
        failure_threshold: 30

clusters:
  mainframe-payments-gg8:
    disabled: false
    template: mainframe-payments-gg8
    infrastructure: mainframe-payments-gke
    data_models:
      - data-model/payments-schema.yaml
    base_data: []
    dcr_data_center_id: 1

# ──────────────────────────────────────────────────────────────────────
# Databases — non-GridGain stores plumbed via the new `databases`
# element type (plugin schema v12). The mainframe-proxy is the
# legacy-system stand-in; mariadb-analytics is the modern operational
# target.
# ──────────────────────────────────────────────────────────────────────
databases:
  postgres-mainframe-proxy:
    type: postgres
    disabled: false
    infrastructure: mainframe-payments-gke
    num_nodes: 1
    min_nodes: 1
    max_nodes: 1
    k8s_namespace: mainframe-proxy
    k8s_node_pool_template: db-gke-pool
    image: postgres:16.4
    port: 5432
    database_name: payments
    # TODO before first deploy: kubectl create secret generic postgres-mainframe-proxy-auth
    #   --namespace mainframe-proxy --from-literal=username=payments --from-literal=password=<...>
    # The user MUST also have REPLICATION privilege for the CDC connector below to work
    # (CREATE ROLE payments WITH REPLICATION PASSWORD '...';).
    auth_secret_ref: postgres-mainframe-proxy-auth
    init_ddl_location: db/postgres-init
    resources:
      cpu_request: 500m
      memory_request: 1Gi
      cpu_limit: "2"
      memory_limit: 2Gi
    storage:
      retain_on_destroy: false
      disk_type: pd-ssd
      storage_size: 10Gi
    timeouts:
      statefulset: 300

  mariadb-analytics:
    type: mariadb
    disabled: false
    infrastructure: mainframe-payments-gke
    num_nodes: 1
    min_nodes: 1
    max_nodes: 1
    k8s_namespace: mariadb-analytics
    k8s_node_pool_template: db-gke-pool
    image: mariadb:11.4
    port: 3306
    database_name: payments
    # TODO before first deploy: kubectl create secret generic mariadb-analytics-auth
    #   --namespace mariadb-analytics --from-literal=username=payments --from-literal=password=<...>
    #   --from-literal=root_password=<...>
    auth_secret_ref: mariadb-analytics-auth
    init_ddl_location: db/mariadb-init
    resources:
      cpu_request: 500m
      memory_request: 1Gi
      cpu_limit: "2"
      memory_limit: 2Gi
    storage:
      retain_on_destroy: false
      disk_type: pd-ssd
      storage_size: 10Gi
    timeouts:
      statefulset: 300

# ──────────────────────────────────────────────────────────────────────
# CDC Connector — Debezium + Kafka pipeline from the Postgres
# mainframe-proxy into the GG8 cluster (plugin schema v13).
# ──────────────────────────────────────────────────────────────────────
cdc_connectors:
  mainframe-to-gg:
    disabled: false
    source: postgres-mainframe-proxy
    sink: mainframe-payments-gg8
    infrastructure: mainframe-payments-gke
    k8s_namespace: cdc-pipeline
    k8s_node_pool_template: cdc-gke-pool
    num_nodes: 1
    min_nodes: 1
    max_nodes: 1
    mapping_rules:
      - source_table: public.customer
        sink_cache: Customer
        primary_key: customer_id
      - source_table: public.account
        sink_cache: Account
        primary_key: account_id
      - source_table: public.transaction
        sink_cache: Transaction
        primary_key: transaction_id
      - source_table: public.product
        sink_cache: Product
        primary_key: product_id
    # Additional Kafka Connect connectors registered against the same Connect
    # cluster (beyond the auto-generated Debezium source):
    #   cdc-sink           Kafka → GG  (applies mainframe CDC events into GG SQL tables)
    #   gg-cache-publisher GG → Kafka  (publishes GG cache changes for the outbound tailers)
    # Both plugin classes are baked into the custom kafka_connect.image (Path A).
    connectors:
      - name: cdc-sink
        class: com.gridgain.demo.payments.cdcsink.GgSinkConnector
        config:
          gg.jdbc.url: "jdbc:ignite:thin://mainframe-payments-gg8.mainframe-payments-gg8.svc.cluster.local:10800"
          gg.sql.schema: PUBLIC
          dialect: gg8
          # Apply ONLY mainframe-originated rows to GG. Without this, GG-originated rows
          # (source='gg') that the gg-to-postgres write-through lands in Postgres get
          # re-captured by Debezium and re-applied to GG here, forming an infinite
          # GG→Postgres→Debezium→GG→publisher loop (every phase-3 GG transaction would
          # cycle forever). GgSinkTask drops records whose after.source != this value.
          source.filter: "mf"
          topics: "mainframe-to-gg.public.customer,mainframe-to-gg.public.account,mainframe-to-gg.public.transaction,mainframe-to-gg.public.product"
          # The Debezium source publishes schemaless JSON (value/key
          # converter.schemas.enable=false). The sink must match, or it fails with
          # "JsonConverter with schemas.enable requires schema and payload fields".
          key.converter: "org.apache.kafka.connect.json.JsonConverter"
          key.converter.schemas.enable: "false"
          value.converter: "org.apache.kafka.connect.json.JsonConverter"
          value.converter.schemas.enable: "false"
        secrets: {}
      - name: gg-cache-publisher
        class: com.gridgain.demo.payments.ggcachepublisher.GgSourceConnector
        config:
          gg.client.addresses: "mainframe-payments-gg8.mainframe-payments-gg8.svc.cluster.local:10800"
          # SQL-created tables are backed by caches named SQL_PUBLIC_<TABLE>. GgSourceTask
          # registers the ContinuousQuery on these cache names and strips the SQL_PUBLIC_
          # prefix to derive the topic/table name. Bare names (e.g. "Customer") don't exist
          # as caches and fail the task with "Cache does not exist".
          gg.caches: "SQL_PUBLIC_CUSTOMER,SQL_PUBLIC_ACCOUNT,SQL_PUBLIC_TRANSACTION"
        secrets: {}
      # Outbound GG write-through fan-out (CLAUDE.md §7). The gg-cache-publisher emits
      # a schema-bearing Debezium-style envelope on from-gg.public.* / from-mf.public.*
      # (gg.public.<table>.Envelope), so these off-the-shelf debezium-connector-jdbc
      # sinks consume it directly. Three settings are load-bearing and differ from a
      # naive recipe:
      #   * key/value converter schemas.enable=TRUE — the publisher's records carry a
      #     Connect schema; the sink NPEs (null valueSchema) if it reads schemaless.
      #   * primary.key.fields is OMITTED — with record_key mode an empty string parses
      #     to [""] (Java String.split), matching no field → "no key fields defined".
      #     Omitting it uses all record-key struct fields, which differ per table.
      #   * consumer.override.auto.offset.reset=latest — the sinks carry the live
      #     fan-out only; baseline data lands via the demo UI's direct bulk-loads.
      - name: gg-to-postgres
        class: io.debezium.connector.jdbc.JdbcSinkConnector
        config:
          tasks.max: "1"
          topics: "from-gg.public.account,from-gg.public.transaction,from-gg.public.customer,from-gg.public.product"
          connection.url: "jdbc:postgresql://postgres-mainframe-proxy.mainframe-proxy.svc.cluster.local:5432/payments?reWriteBatchedInserts=true"
          connection.username: "__PG_USER__"
          connection.password: "__PG_PASSWORD__"
          insert.mode: "upsert"
          primary.key.mode: "record_key"
          delete.enabled: "true"
          table.name.format: "${topic}"
          transforms: "stripPrefix"
          transforms.stripPrefix.type: "org.apache.kafka.connect.transforms.RegexRouter"
          transforms.stripPrefix.regex: "from-gg\\.public\\.(.*)"
          transforms.stripPrefix.replacement: "$1"
          key.converter: "org.apache.kafka.connect.json.JsonConverter"
          key.converter.schemas.enable: "true"
          value.converter: "org.apache.kafka.connect.json.JsonConverter"
          value.converter.schemas.enable: "true"
          consumer.override.auto.offset.reset: "latest"
        secrets:
          __PG_USER__:
            secret_ref: gg-to-postgres-jdbc-auth
            key: username
          __PG_PASSWORD__:
            secret_ref: gg-to-postgres-jdbc-auth
            key: password
      - name: gg-to-mariadb
        class: io.debezium.connector.jdbc.JdbcSinkConnector
        config:
          tasks.max: "1"
          topics.regex: "from-(gg|mf)\\.public\\..*"
          connection.url: "jdbc:mariadb://mariadb-analytics.mariadb-analytics.svc.cluster.local:3306/payments?sessionVariables=foreign_key_checks=0"
          connection.username: "__MARIADB_USER__"
          connection.password: "__MARIADB_PASSWORD__"
          insert.mode: "upsert"
          primary.key.mode: "record_key"
          delete.enabled: "true"
          table.name.format: "${topic}"
          transforms: "stripPrefix"
          transforms.stripPrefix.type: "org.apache.kafka.connect.transforms.RegexRouter"
          transforms.stripPrefix.regex: "from-(gg|mf)\\.public\\.(.*)"
          transforms.stripPrefix.replacement: "$2"
          key.converter: "org.apache.kafka.connect.json.JsonConverter"
          key.converter.schemas.enable: "true"
          value.converter: "org.apache.kafka.connect.json.JsonConverter"
          value.converter.schemas.enable: "true"
          consumer.override.auto.offset.reset: "latest"
        secrets:
          __MARIADB_USER__:
            secret_ref: gg-to-mariadb-jdbc-auth
            key: username
          __MARIADB_PASSWORD__:
            secret_ref: gg-to-mariadb-jdbc-auth
            key: password
    kafka:
      image: apache/kafka:3.9.2
      replicas: 1
      client_port: 9092
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: "2"
        memory_limit: 2Gi
      storage:
        retain_on_destroy: false
        disk_type: pd-ssd
        storage_size: 20Gi
    kafka_connect:
      # Custom image: debezium/connect with the demo's two connector plugins baked
      # in (built from connect-image/Dockerfile, Path A). Must be a PUBLIC GHCR
      # package — the Connect Deployment sets no imagePullSecret for this field.
      image: ghcr.io/escapedcanadian/mainframe-payments-connect:0.0.4
      replicas: 1
      rest_port: 8083
      # GG8's thin-client/JDBC driver needs these --add-opens to initialise under the
      # Connect image's JDK 17 runtime. Joined with spaces and exported as KAFKA_OPTS.
      jvm_opts:
        - "--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED"
        - "--add-opens=java.base/sun.nio.ch=ALL-UNNAMED"
        - "--add-opens=java.base/java.lang=ALL-UNNAMED"
        - "--add-opens=java.base/java.lang.invoke=ALL-UNNAMED"
        - "--add-opens=java.base/java.io=ALL-UNNAMED"
        - "--add-opens=java.base/java.nio=ALL-UNNAMED"
        - "--add-opens=java.base/java.util=ALL-UNNAMED"
        - "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED"
        - "--add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED"
        - "--add-opens=java.base/java.math=ALL-UNNAMED"
        - "--add-opens=java.base/javax.management=ALL-UNNAMED"
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: "2"
        memory_limit: 2Gi
    debezium:
      slot_name: mainframe_payments_slot
      publication_name: mainframe_payments_pub
      # TODO before first deploy: kubectl create secret generic mainframe-to-gg-debezium-auth
      #   --namespace cdc-pipeline --from-literal=username=<replication-user> --from-literal=password=<...>
      # The replication user must have REPLICATION privilege on the source Postgres.
      replication_user_secret_ref: mainframe-to-gg-debezium-auth
    timeouts:
      kafka_statefulset: 300
      kafka_connect_deploy: 300
      connector_register: 180

# ──────────────────────────────────────────────────────────────────────
# Image registries + images — all pulled from Docker Hub for the demo.
# ──────────────────────────────────────────────────────────────────────
image_registries:
  docker-hub-public:
    host: docker.io
    auth:
      credentials:
        kind: anonymous
  # GHCR registry for the demo's derived images (copied from gridgain-demo-toolkit-dev).
  # Auth + push use the GHCR_PAT env var (export it before deploy); no token is stored here.
  david-personal-ghcr:
    host: ghcr.io/escapedcanadian
    auth:
      credentials:
        kind: env
        username: escapedcanadian
        password_env: GHCR_PAT
    push_auth:
      credentials:
        kind: env
        username: escapedcanadian
        token_env: GHCR_PAT

images:
  gridgain8:
    pull_from: docker-hub-public
    repository: gridgain/ultimate
    tag: 8.9.33-p1-openjdk17
    pull_policy: IfNotPresent
    gridgain_major_version: 8
  # connectTestClient image — required by validation whenever a GG8 cluster is configured.
  test-client-gg8:
    pull_from: david-personal-ghcr
    repository: demo-test-client-gg8
    tag: 0.5.1-SNAPSHOT
    pull_policy: IfNotPresent
    gridgain_major_version: 8
  # dataGenerate image — used by the data-generator's in-cluster Job mode.
  data-generator-gg8:
    pull_from: david-personal-ghcr
    repository: gridgain-data-generator-gg8
    tag: 0.5.1-SNAPSHOT
    pull_policy: Always
    gridgain_major_version: 8
