schema_version: 13

demo:
  name: mainframe-payments
  description: |
    Mainframe Payments Demo — incremental migration of high-throughput payment workloads
    off a mainframe onto a modern stack: Postgres mainframe-proxy → GG8 write-through →
    MariaDB analytics, with one-way CDC (Debezium + Kafka) feeding GG from the proxy.
  stage: development
  gridgain8_license_file: cluster/gridgain8-license.xml
  gridgain9_license_file: cluster/gridgain-license.json
  controlcenter_license_file: controlcenter/controlcenter-license.xml
  log_ready_checks: false
  ownership_tag: mainframe-payments-demo
  output_directory: build/gridgain/output
  runtime_directory: build/gridgain/.runtime
  working_directory: .
  demo_access:
    enabled: true
    max_exposed_nodes: 3

# ──────────────────────────────────────────────────────────────────────
# Infrastructure
# ──────────────────────────────────────────────────────────────────────
infrastructure_accounts:
  gcp-dev:
    disabled: false
    provider: gcp
    # TODO before first deploy: replace with the GCP account / project you own.
    gke_account: david.brown@gridgain.com
    gke_project: david-brown-personal

infrastructure_templates:
  mainframe-payments-gke:
    disabled: false
    platform: gke
    k8s_default_pool_template: default-gke-pool
    k8s_requested_default_nodes: 1
    k8s_min_default_nodes: 1
    k8s_max_default_nodes: 3

infrastructures:
  mainframe-payments-gke:
    disabled: false
    template: mainframe-payments-gke
    account: gcp-dev
    region: us-west1
    zones:
      - a
    zone_spread: SINGLE

node_pool_templates:
  default-gke-pool:
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  gg-cluster-gke-pool:
    # GridGain cluster nodes — sized for the demo's working set + persistence.
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 30GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  cc-gke-pool:
    platform: gke
    gke_machine_type: n2d-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  db-gke-pool:
    # Shared by Postgres mainframe-proxy and MariaDB analytics — co-locating both
    # databases on the same pool is fine for a 5–10 min demo.
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  cdc-gke-pool:
    # Kafka + Kafka Connect for the CDC pipeline.
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 30GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true

# ──────────────────────────────────────────────────────────────────────
# Cluster (single GG8 cluster — GG9 variant deferred per CLAUDE.md §15)
# ──────────────────────────────────────────────────────────────────────
cluster_templates:
  mainframe-payments-gg8:
    disabled: false
    platform: gke
    nodes: 2
    replicas: 1
    management_port: 8080
    client_port: 10800
    discovery_port: 47500
    multicast:
      group: 228.1.2.4
      port: 47400
      result_wait_time: 2000
      ttl: 5
    metastorage_node_limit: 3
    resources:
      limits:
        cpu: 3000m
        memory: 10Gi
      requests:
        cpu: 2000m
        memory: 8Gi
      data_storage:
        size: 10Gi
    data_models: []
    base_data: []
    telemetry:
      service_port: 3200
      sources:
        - jvm
        - os
    image: gridgain8
    k8s_node_pool_template: gg-cluster-gke-pool
    k8s_storage:
      retain_on_cluster_destroy: false
      disk_type: pd-ssd
      volume_binding_mode: WaitForFirstConsumer
    pvc_retention_policy:
      enabled: false
      when_scaled: Retain
      when_deleted: Retain
    extra_env_vars: []
    extra_volume_mounts: []
    extra_volumes: []
    job_resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    statefulset_policy:
      pod_management_policy: Parallel
      update_strategy_type: RollingUpdate
      update_strategy_partition: 0
      revision_history_limit: 10
      work_dir: /opt/ignite/work
    persistence_enabled: true
    snapshot_profiles: {}
    pod_lifecycle:
      termination_grace_period_seconds: 180
      liveness_probe:
        enabled: false
        path: /
        port: 8080
        initial_delay_seconds: 0
        period_seconds: 10
        timeout_seconds: 1
        success_threshold: 1
        failure_threshold: 3
      readiness_probe:
        enabled: false
        path: /
        port: 8080
        initial_delay_seconds: 0
        period_seconds: 10
        timeout_seconds: 1
        success_threshold: 1
        failure_threshold: 3
      startup_probe:
        enabled: false
        path: /
        port: 8080
        initial_delay_seconds: 0
        period_seconds: 10
        timeout_seconds: 1
        success_threshold: 1
        failure_threshold: 30

clusters:
  mainframe-payments-gg8:
    disabled: false
    template: mainframe-payments-gg8
    infrastructure: mainframe-payments-gke
    data_models: []
    base_data: []
    monitoring:
      cc-gke:
        connector_template: ignite-agent
    dcr_data_center_id: 1

# ──────────────────────────────────────────────────────────────────────
# Monitor — Control Center for ops visibility (operator-facing, not
# part of the audience-facing demo flow)
# ──────────────────────────────────────────────────────────────────────
monitors:
  cc-gke:
    type: control-center
    disabled: false
    infrastructure: mainframe-payments-gke
    # TODO before first deploy: pick a real admin email / strong password.
    admin_email: admin@example.com
    admin_password: changeme
    num_nodes: 1
    min_nodes: 1
    max_nodes: 3
    k8s_namespace: gg-control-center
    k8s_node_pool_template: cc-gke-pool
    backend:
      image: gridgain/control-center-backend:latest
      replicas: 1
      exporter_target_port: 9090
      exporter_target_port_tls: 9443
      storage_port: 5432
      jvm_opts: ''
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: 2000m
        memory_limit: 2Gi
    frontend:
      image: gridgain/control-center-frontend:latest
      replicas: 1
      ui_port: 8008
      ui_port_tls: 8443
      resources:
        cpu_request: 100m
        memory_request: 256Mi
        cpu_limit: 500m
        memory_limit: 512Mi
    storage:
      retain_on_destroy: false
      disk_type: pd-standard
      storage_size: 10Gi
    timeouts:
      statefulset: 300
      deployment: 300
      login_url: 300
      load_balancer: 300

# ──────────────────────────────────────────────────────────────────────
# Databases — non-GridGain stores plumbed via the new `databases`
# element type (plugin schema v12). The mainframe-proxy is the
# legacy-system stand-in; mariadb-analytics is the modern operational
# target.
# ──────────────────────────────────────────────────────────────────────
databases:
  postgres-mainframe-proxy:
    type: postgres
    disabled: false
    infrastructure: mainframe-payments-gke
    num_nodes: 1
    min_nodes: 1
    max_nodes: 1
    k8s_namespace: mainframe-proxy
    k8s_node_pool_template: db-gke-pool
    image: postgres:16.4
    port: 5432
    database_name: payments
    # TODO before first deploy: kubectl create secret generic postgres-mainframe-proxy-auth
    #   --namespace mainframe-proxy --from-literal=username=payments --from-literal=password=<...>
    # The user MUST also have REPLICATION privilege for the CDC connector below to work
    # (CREATE ROLE payments WITH REPLICATION PASSWORD '...';).
    auth_secret_ref: postgres-mainframe-proxy-auth
    init_ddl_location: db/postgres-init
    resources:
      cpu_request: 500m
      memory_request: 1Gi
      cpu_limit: "2"
      memory_limit: 2Gi
    storage:
      retain_on_destroy: false
      disk_type: pd-ssd
      storage_size: 10Gi
    timeouts:
      statefulset: 300

  mariadb-analytics:
    type: mariadb
    disabled: false
    infrastructure: mainframe-payments-gke
    num_nodes: 1
    min_nodes: 1
    max_nodes: 1
    k8s_namespace: mariadb-analytics
    k8s_node_pool_template: db-gke-pool
    image: mariadb:11.4
    port: 3306
    database_name: payments
    # TODO before first deploy: kubectl create secret generic mariadb-analytics-auth
    #   --namespace mariadb-analytics --from-literal=username=payments --from-literal=password=<...>
    #   --from-literal=root_password=<...>
    auth_secret_ref: mariadb-analytics-auth
    init_ddl_location: db/mariadb-init
    resources:
      cpu_request: 500m
      memory_request: 1Gi
      cpu_limit: "2"
      memory_limit: 2Gi
    storage:
      retain_on_destroy: false
      disk_type: pd-ssd
      storage_size: 10Gi
    timeouts:
      statefulset: 300

# ──────────────────────────────────────────────────────────────────────
# CDC Connector — Debezium + Kafka pipeline from the Postgres
# mainframe-proxy into the GG8 cluster (plugin schema v13).
# ──────────────────────────────────────────────────────────────────────
cdc_connectors:
  mainframe-to-gg:
    disabled: false
    source: postgres-mainframe-proxy
    sink: mainframe-payments-gg8
    infrastructure: mainframe-payments-gke
    k8s_namespace: cdc-pipeline
    k8s_node_pool_template: cdc-gke-pool
    num_nodes: 1
    min_nodes: 1
    max_nodes: 1
    mapping_rules:
      - source_table: public.customer
        sink_cache: Customer
        primary_key: customer_id
      - source_table: public.account
        sink_cache: Account
        primary_key: account_id
      - source_table: public.transaction
        sink_cache: Transaction
        primary_key: transaction_id
    kafka:
      image: bitnami/kafka:3.7
      replicas: 1
      client_port: 9092
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: "2"
        memory_limit: 2Gi
      storage:
        retain_on_destroy: false
        disk_type: pd-ssd
        storage_size: 20Gi
    kafka_connect:
      image: debezium/connect:3.0
      replicas: 1
      rest_port: 8083
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: "2"
        memory_limit: 2Gi
    debezium:
      slot_name: mainframe_payments_slot
      publication_name: mainframe_payments_pub
      # TODO before first deploy: kubectl create secret generic mainframe-to-gg-debezium-auth
      #   --namespace cdc-pipeline --from-literal=username=<replication-user> --from-literal=password=<...>
      # The replication user must have REPLICATION privilege on the source Postgres.
      replication_user_secret_ref: mainframe-to-gg-debezium-auth
    timeouts:
      kafka_statefulset: 300
      kafka_connect_deploy: 300
      connector_register: 180

# ──────────────────────────────────────────────────────────────────────
# Connector templates — only the ignite-agent is needed; it's the
# small artifact the GG8 cluster runs to attach to Control Center.
# ──────────────────────────────────────────────────────────────────────
connector_templates:
  ignite-agent:
    type: ignite-agent

# ──────────────────────────────────────────────────────────────────────
# Image registries + images — all pulled from Docker Hub for the demo.
# ──────────────────────────────────────────────────────────────────────
image_registries:
  docker-hub-public:
    host: docker.io
    auth:
      credentials:
        kind: anonymous
  # GHCR org used by the demo-test-client and data-generator container images.
  # TODO before first deploy: set GHCR_PAT in your environment, replace the username
  # with your own GHCR account, or repoint pull_from to a registry you control.
  demo-images-ghcr:
    host: ghcr.io/YOUR_GHCR_USERNAME
    auth:
      credentials:
        kind: env
        username: YOUR_GHCR_USERNAME
        password_env: GHCR_PAT
    push_auth:
      credentials:
        kind: env
        username: YOUR_GHCR_USERNAME
        token_env: GHCR_PAT

images:
  gridgain8:
    pull_from: docker-hub-public
    repository: gridgain/ultimate
    tag: 8.9.33-p1-openjdk17
    pull_policy: IfNotPresent
    gridgain_major_version: 8
  control-center-backend:
    pull_from: docker-hub-public
    repository: gridgain/control-center-backend
    tag: 2024.4.0
    pull_policy: IfNotPresent
    gridgain_major_version: 9
  control-center-frontend:
    pull_from: docker-hub-public
    repository: gridgain/control-center-frontend
    tag: 2024.4.0
    pull_policy: IfNotPresent
    gridgain_major_version: 9
  # connectTestClient image — required by validation whenever a GG8 cluster is configured.
  test-client-gg8:
    pull_from: demo-images-ghcr
    repository: demo-test-client-gg8
    tag: 0.5.1-SNAPSHOT
    pull_policy: IfNotPresent
    gridgain_major_version: 8
  # dataGenerate image — used by the data-generator's in-cluster Job mode.
  data-generator-gg8:
    pull_from: demo-images-ghcr
    repository: gridgain-data-generator-gg8
    tag: 0.5.1-SNAPSHOT
    pull_policy: Always
    gridgain_major_version: 8
