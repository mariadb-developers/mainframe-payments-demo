dcr_templates:
  gg8-full:
    type: gg8
    sender_configuration:
      sender_groups:
      - default
    receiver_configuration:
      local_inbound_port: 49000
      message_queue_limit: 10000
    replicate_all: true
    cache_defaults:
      sender_group: default
      batch_send_size: 32768
    caches: []
dcr_connections: {}
