demo:
  name: template
  description: GridGain Demo Toolkit template
  stage: development
  gridgain9_license_file: cluster/gridgain-license.json
  gridgain8_license_file: cluster/gridgain8-license.xml
  controlcenter_license_file: controlcenter/controlcenter-license.xml
  log_ready_checks: false
  ownership_tag: david.brown
  output_directory: build/gridgain/output
  runtime_directory: build/gridgain/.runtime
  working_directory: .
  demo_access:
    enabled: true
    max_exposed_nodes: 3
clusters:
  example-gcp-8a:
    disabled: false
    template: gke-standard-v8
    infrastructure: staging-gcp
    data_models: []
    base_data: []
    monitoring:
      cc-gcp:
        connector_template: ignite-agent
      pg-gcp:
        connector_template: gke-otel-collector
    dcr_data_center_id: 3
monitors:
  cc-gcp:
    type: control-center
    infrastructure: staging-gcp
    admin_email: david.brown@gridgain.com
    admin_password: monitor
    num_nodes: 1
    min_nodes: 1
    max_nodes: 3
    k8s_namespace: gg-control-center
    k8s_node_pool_template: cc-gke-pool
    backend:
      image: gridgain/control-center-backend:latest
      replicas: 1
      exporter_target_port: 9090
      exporter_target_port_tls: 9443
      storage_port: 5432
      jvm_opts: ""
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: 2000m
        memory_limit: 2Gi
    frontend:
      image: gridgain/control-center-frontend:latest
      replicas: 1
      ui_port: 8008
      ui_port_tls: 8443
      resources:
        cpu_request: 100m
        memory_request: 256Mi
        cpu_limit: 500m
        memory_limit: 512Mi
    storage:
      retain_on_destroy: false
      disk_type: pd-standard
      storage_size: 10Gi
    timeouts:
      statefulset: 300
      deployment: 300
      login_url: 300
      load_balancer: 300
  cc-aws:
    disabled: false
    type: control-center
    infrastructure: staging-aws
    admin_email: david.brown@gridgain.com
    admin_password: monitor
    num_nodes: 1
    min_nodes: 1
    max_nodes: 3
    k8s_namespace: gg-control-center
    k8s_node_pool_template: cc-eks-pool
    backend:
      image: gridgain/control-center-backend:latest
      replicas: 1
      exporter_target_port: 9090
      exporter_target_port_tls: 9443
      storage_port: 5432
      jvm_opts: ""
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: 2000m
        memory_limit: 2Gi
    frontend:
      image: gridgain/control-center-frontend:latest
      replicas: 1
      ui_port: 8008
      ui_port_tls: 8443
      resources:
        cpu_request: 100m
        memory_request: 256Mi
        cpu_limit: 500m
        memory_limit: 512Mi
    storage:
      retain_on_destroy: false
      disk_type: gp3
      storage_size: 10Gi
    timeouts:
      statefulset: 300
      deployment: 300
      login_url: 300
      load_balancer: 300
  pg-gcp:
    type: prometheus-grafana
    infrastructure: staging-gcp
    num_nodes: 1
    min_nodes: 1
    max_nodes: 3
    k8s_namespace: gg-prometheus-grafana
    k8s_node_pool_template: cc-gke-pool
    prometheus:
      image: prom/prometheus:v3.4.1
      replicas: 1
      scrape_port: 9090
      resources:
        cpu_request: 500m
        memory_request: 1Gi
        cpu_limit: 2000m
        memory_limit: 4Gi
    grafana:
      image: grafana/grafana:11.6.0
      replicas: 1
      ui_port: 3000
      resources:
        cpu_request: 100m
        memory_request: 256Mi
        cpu_limit: 500m
        memory_limit: 512Mi
    include_overview_dashboard: true
    dashboards: []
    storage:
      retain_on_destroy: false
      disk_type: pd-standard
      prometheus_storage_size: 20Gi
    timeouts:
      statefulset: 300
      deployment: 300
      load_balancer: 300
infrastructures:
  staging-gcp:
    disabled: false
    template: staging-gke
    account: gcp-dev
    region: us-west1
    zones:
    - a
    - b
    - c
    zone_spread: MULTI
  staging-aws:
    disabled: false
    template: staging-eks
    account: aws-dev
    region: us-west-2
    zones:
    - a
    zone_spread: SINGLE
infrastructure_accounts:
  gcp-dev:
    disabled: false
    provider: gcp
    gke_account: david.brown@gridgain.com
    gke_project: david-brown-personal
  aws-dev:
    disabled: false
    provider: aws
    aws_profile: cli-dev
    aws_account: 930793918939
infrastructure_templates:
  staging-gke:
    disabled: false
    platform: gke
    k8s_default_pool_template: default-gke-pool
    k8s_requested_default_nodes: 1
    k8s_min_default_nodes: 1
    k8s_max_default_nodes: 3
  staging-eks:
    disabled: false
    platform: eks
    eks_kubernetes_version: 1.32
    k8s_default_pool_template: default-eks-pool
    k8s_requested_default_nodes: 1
    k8s_min_default_nodes: 1
    k8s_max_default_nodes: 3
node_pool_templates:
  default-gke-pool:
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  cc-gke-pool:
    platform: gke
    gke_machine_type: n2d-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  cluster-gke-pool:
    platform: gke
    gke_machine_type: n2-highmem-8
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 1
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  cluster-gke-pool-v8:
    platform: gke
    gke_machine_type: e2-standard-4
    gke_disk_type: pd-standard
    gke_disk_size: 20GB
    gke_local_ssd_count: 0
    gke_enable_autorepair: true
    gke_enable_autoupgrade: false
    gke_enable_ip_alias: true
  default-eks-pool:
    platform: eks
    eks_instance_type: m5.xlarge
    eks_volume_type: gp3
    eks_volume_size: 20GB
    eks_ami_type: AmazonLinux2023
    eks_capacity_type: ON_DEMAND
    eks_local_nvme_count: 0
    eks_enable_autoupgrade: false
    eks_endpoint_public_access: true
  cc-eks-pool:
    platform: eks
    eks_instance_type: r5.2xlarge
    eks_volume_type: gp3
    eks_volume_size: 20GB
    eks_ami_type: AmazonLinux2023
    eks_capacity_type: ON_DEMAND
    eks_local_nvme_count: 0
    eks_enable_autoupgrade: false
    eks_endpoint_public_access: true
  cluster-eks-pool:
    platform: eks
    eks_instance_type: r5.2xlarge
    eks_volume_type: gp3
    eks_volume_size: 20GB
    eks_ami_type: AmazonLinux2023
    eks_capacity_type: ON_DEMAND
    eks_local_nvme_count: 0
    eks_enable_autoupgrade: false
    eks_endpoint_public_access: true
cluster_templates:
  gke-standard-v9:
    disabled: false
    platform: gke
    nodes: 2
    replicas: 1
    management_port: 10300
    client_port: 10800
    discovery_port: 3344
    multicast:
      group: 239.192.0.0
      port: 47401
      result_wait_time: 500
      ttl: -1
    metastorage_node_limit: 3
    resources:
      limits:
        cpu: 3000m
        memory: 10Gi
      requests:
        cpu: 2000m
        memory: 8Gi
      data_storage:
        size: 10Gi
    telemetry:
      service_port: 3200
      sources:
      - client.handler
      - clock.service
      - expiration
      - index.builder
      - jvm
      - license
      - log.storage
      - messaging
      - metastorage
      - os
      - placement-driver
      - raft
      - raft.snapshots
      - resource.vacuum
      - sql.client
      - sql.memory
      - sql.offloading
      - sql.plan.cache
      - sql.queries
      - storage.aipersist
      - storage.aipersist.checkpoint
      - thread.pools.*
      - topology.*
      - transactions
      - upgrade.rolling
    k8s_node_pool_template: cluster-gke-pool
    k8s_storage:
      retain_on_cluster_destroy: false
      disk_type: pd-ssd
      volume_binding_mode: WaitForFirstConsumer
    pvc_retention_policy:
      enabled: false
      when_scaled: Retain
      when_deleted: Retain
    extra_env_vars: []
    extra_volume_mounts: []
    extra_volumes: []
    job_resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi
    statefulset_policy:
      pod_management_policy: Parallel
      update_strategy_type: RollingUpdate
      update_strategy_partition: 0
      revision_history_limit: 10
      work_dir: /gg9-work
    snapshot_profiles: {}
    pod_lifecycle:
      termination_grace_period_seconds: 180
      liveness_probe:
        enabled: true
        path: /management/v1/node/state
        port: 10300
        initial_delay_seconds: 60
        period_seconds: 20
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 3
      readiness_probe:
        enabled: true
        path: /management/v1/node/state
        port: 10300
        initial_delay_seconds: 30
        period_seconds: 10
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 3
      startup_probe:
        enabled: false
        path: /management/v1/node/state
        port: 10300
        initial_delay_seconds: 10
        period_seconds: 10
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 30
    image: gridgain9
  gke-standard-v8:
    disabled: false
    platform: gke
    nodes: 2
    replicas: 1
    management_port: 8080
    client_port: 10800
