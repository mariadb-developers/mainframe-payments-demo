schema_version: 4

targets:
  - name: mainframe-payments-gg8
    kind: gg8-kv
    cluster_name: mainframe-payments-gg8

# Live throughput + per-op GridGain execution latency, published ~1s to a Kafka topic for the
# demo UI's top-right graphs (the demo-ui backend's GeneratorMetricsService consumes it). The
# generator runs in-cluster (dataGenerate default mode), so this is the cluster-internal broker
# DNS; the UI backend reads the same topic over its own (external/port-forwarded) bootstrap.
metrics:
  kafka_bootstrap: "mainframe-to-gg-kafka.cdc-pipeline.svc.cluster.local:9092"
  topic: "generator-metrics"
  interval_ms: 1000

scenarios:
  # The phase-6 load scenario. This is the CANONICAL single-source-of-truth ops file.
  # The demo-ui backend (GeneratorControlService) does NOT run it directly for the load
  # control — it reads this file, overrides `rate.ops_per_second` (to total/pods) and
  # injects a `distribution: {replicas, partition_count}` block, writes a runtime copy
  # to demoOutputDirectory, and invokes `dataGenerate --ops=<runtime copy>` (per CLAUDE.md
  # §10). Running this file as-is via the CLI is single-pod, blocking mode.
  - name: mainframe-payments-load
    target: mainframe-payments-gg8
    root_schemas: [customer]
    rate: { kind: constant, ops_per_second: 20 }
    # ISO-8601 duration — the generator parses this with java.time.Duration.parse,
    # which requires the PnYnMnDTnHnMnS form ("10m" throws DateTimeParseException).
    duration: { kind: time, value: "PT10M" }
    # none, not business_event: the GG8 SQL tables are ATOMIC atomicity mode (the CREATE TABLE
    # default), and GG8 8.9+ rejects atomic-cache operations inside a transaction — so a
    # business_event (transactional) write rolls back every time ("TargetReportedFailure"), which
    # was the ~80% error rate. Plain atomic puts succeed and give higher write throughput, which is
    # what a load generator aimed at saturating GG wants anyway. (Transactional load would require
    # recreating the caches as TRANSACTIONAL in the data model.)
    transaction_scope: none
    provisioning: skip   # GG cache schema is provisioned via the plugin's deployDataModel
    read_ratio: 0.20
